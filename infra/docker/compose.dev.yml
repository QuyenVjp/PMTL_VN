services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      target: dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SENTRY_ENABLED: "false"
      SENTRY_ENABLED: "false"
      WATCHPACK_POLLING: "true"
    depends_on:
      cms:
        condition: service_healthy
    working_dir: /app
    command: ["sh", "/app/infra/scripts/docker-dev-start.sh", "web"]
    ports:
      - "3000:3000"
    volumes:
      - ../../package.json:/app/package.json:ro
      - ../../pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ../../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ../../turbo.json:/app/turbo.json:ro
      - ../../apps/web/src:/app/apps/web/src
      - ../../apps/web/public:/app/apps/web/public
      - ../../apps/web/package.json:/app/apps/web/package.json:ro
      - ../../apps/web/tsconfig.json:/app/apps/web/tsconfig.json:ro
      - ../../apps/web/next-env.d.ts:/app/apps/web/next-env.d.ts:ro
      - ../../apps/web/next.config.ts:/app/apps/web/next.config.ts:ro
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../packages/shared/package.json:/app/packages/shared/package.json:ro
      - ../../packages/ui/src:/app/packages/ui/src
      - ../../packages/ui/package.json:/app/packages/ui/package.json:ro
      - ../../packages/config:/app/packages/config:ro
      - ../../infra/scripts/docker-dev-start.sh:/app/infra/scripts/docker-dev-start.sh:ro
      - node-modules:/app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
      - turbo-cache:/app/.turbo
      - web-next-cache:/app/apps/web/.next
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 180s
    init: true
    restart: unless-stopped
    networks:
      - frontend
      - backend

  cms:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
      target: dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      PORT: 3001
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SENTRY_ENABLED: "false"
      SENTRY_ENABLED: "false"
      WATCHPACK_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    command: ["sh", "/app/infra/scripts/docker-dev-start.sh", "cms"]
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - ../../package.json:/app/package.json:ro
      - ../../pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ../../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ../../turbo.json:/app/turbo.json:ro
      - ../../apps/cms/src:/app/apps/cms/src
      - ../../apps/cms/public:/app/apps/cms/public
      - ../../apps/cms/package.json:/app/apps/cms/package.json:ro
      - ../../apps/cms/tsconfig.json:/app/apps/cms/tsconfig.json:ro
      - ../../apps/cms/next-env.d.ts:/app/apps/cms/next-env.d.ts:ro
      - ../../apps/cms/next.config.mjs:/app/apps/cms/next.config.mjs:ro
      - ../../apps/cms/eslint.config.mjs:/app/apps/cms/eslint.config.mjs:ro
      - ../../apps/cms/.env.local:/app/apps/cms/.env.local:ro
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../packages/shared/package.json:/app/packages/shared/package.json:ro
      - ../../packages/config:/app/packages/config:ro
      - ../../infra/scripts/docker-dev-start.sh:/app/infra/scripts/docker-dev-start.sh:ro
      - node-modules:/app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
      - turbo-cache:/app/.turbo
      - cms-next-cache:/app/apps/cms/.next
      - cms-media-dev:/app/apps/cms/media
      - worker-heartbeat:/var/run/pmtl
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 240s
    init: true
    networks:
      - backend

  worker:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
      target: dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      SENTRY_ENABLED: "false"
      WORKER_HEARTBEAT_PATH: /var/run/pmtl/worker-heartbeat.json
      WORKER_HEARTBEAT_STALE_SECONDS: "120"
      CHOKIDAR_USEPOLLING: "true"
    working_dir: /app
    command: ["sh", "/app/infra/scripts/docker-dev-start.sh", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      cms:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../../package.json:/app/package.json:ro
      - ../../pnpm-lock.yaml:/app/pnpm-lock.yaml:ro
      - ../../pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      - ../../turbo.json:/app/turbo.json:ro
      - ../../apps/cms/src:/app/apps/cms/src
      - ../../apps/cms/package.json:/app/apps/cms/package.json:ro
      - ../../apps/cms/tsconfig.json:/app/apps/cms/tsconfig.json:ro
      - ../../apps/cms/next-env.d.ts:/app/apps/cms/next-env.d.ts:ro
      - ../../packages/shared/src:/app/packages/shared/src
      - ../../packages/shared/package.json:/app/packages/shared/package.json:ro
      - ../../packages/config:/app/packages/config:ro
      - ../../infra/scripts/docker-dev-start.sh:/app/infra/scripts/docker-dev-start.sh:ro
      - node-modules:/app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
      - worker-heartbeat:/var/run/pmtl
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('fs');const p=process.env.WORKER_HEARTBEAT_PATH||'/tmp/pmtl-worker-heartbeat';const stale=Number(process.env.WORKER_HEARTBEAT_STALE_SECONDS||120)*1000;const stat=fs.statSync(p);if(Date.now()-stat.mtimeMs>stale) process.exit(1);"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 240s
    init: true
    networks:
      - backend

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - idle_in_transaction_session_timeout=60000
      - -c
      - lock_timeout=5000
      - -c
      - statement_timeout=30000
    env_file:
      - .env.dev
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  meilisearch:
    image: getmeili/meilisearch:v1.14
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
      MEILI_SNAPSHOT_DIR: ${MEILI_SNAPSHOT_DIR:-/meili_data/snapshots}
    volumes:
      - meili-dev-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "7700:7700"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "6379:6379"
    networks:
      - backend

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      cms:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
      - backend

volumes:
  postgres-dev-data:
  meili-dev-data:
  redis-dev-data:
  caddy-data:
  caddy-config:
  worker-heartbeat:
  node-modules:
  pnpm-store:
  turbo-cache:
  web-next-cache:
  cms-next-cache:
  cms-media-dev:

networks:
  frontend:
  backend:
