services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
    depends_on:
      cms:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - frontend
      - backend

  cms:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped
    volumes:
      - worker-heartbeat:/var/run/pmtl
    networks:
      - backend

  worker:
    build:
      context: ../..
      dockerfile: apps/cms/Dockerfile
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      WORKER_HEARTBEAT_PATH: /var/run/pmtl/worker-heartbeat.json
      WORKER_HEARTBEAT_STALE_SECONDS: "120"
    command: ["pnpm", "--filter", "@pmtl/cms", "worker:start"]
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      cms:
        condition: service_started
    restart: unless-stopped
    volumes:
      - worker-heartbeat:/var/run/pmtl
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('fs');const p=process.env.WORKER_HEARTBEAT_PATH||'/tmp/pmtl-worker-heartbeat';const stale=Number(process.env.WORKER_HEARTBEAT_STALE_SECONDS||120)*1000;const stat=fs.statSync(p);if(Date.now()-stat.mtimeMs>stale) process.exit(1);"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - backend

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  meilisearch:
    image: getmeili/meilisearch:v1.14
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
      MEILI_SCHEDULE_SNAPSHOT: ${MEILI_SCHEDULE_SNAPSHOT:-false}
      MEILI_SNAPSHOT_DIR: ${MEILI_SNAPSHOT_DIR:-/meili_data/snapshots}
    volumes:
      - meili-dev-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "7700:7700"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "6379:6379"
    networks:
      - backend

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      cms:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
      - backend

volumes:
  postgres-dev-data:
  meili-dev-data:
  redis-dev-data:
  caddy-data:
  caddy-config:
  worker-heartbeat:

networks:
  frontend:
  backend:
