services:
  caddy:
    image: caddy:2.10-alpine
    container_name: pmtl-caddy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      cms:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  web:
    image: ${WEB_IMAGE}
    container_name: pmtl-web
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      cms:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  cms:
    image: ${CMS_IMAGE}
    container_name: pmtl-cms
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  postgres:
    image: postgres:17-alpine
    container_name: pmtl-postgres
    restart: unless-stopped
    env_file:
      - .env.prod
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: pmtl-meilisearch
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili-prod-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: pmtl-redis
    restart: unless-stopped
    profiles: ["stage2"]
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  worker:
    image: ${CMS_IMAGE}
    container_name: pmtl-worker
    restart: unless-stopped
    profiles: ["stage2"]
    env_file:
      - .env.prod
    command: ["sh", "-c", "echo 'Replace with queue worker command in stage 2' && sleep infinity"]
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

volumes:
  postgres-prod-data:
  meili-prod-data:
  redis-prod-data:
  caddy-data:
  caddy-config:

networks:
  frontend:
  backend:
