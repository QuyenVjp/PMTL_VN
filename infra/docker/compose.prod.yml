services:
  caddy:
    image: caddy:2.10-alpine
    container_name: pmtl-caddy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      cms:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  web:
    image: ${WEB_IMAGE}
    container_name: pmtl-web
    restart: unless-stopped
    mem_limit: 1024m
    stop_grace_period: 40s
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      cms:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  cms:
    image: ${CMS_IMAGE}
    container_name: pmtl-cms
    restart: unless-stopped
    mem_limit: 1024m
    stop_grace_period: 40s
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      meilisearch:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - cms-media-prod:/app/apps/cms/media
      - worker-heartbeat:/var/run/pmtl
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  postgres:
    image: postgres:17-alpine
    container_name: pmtl-postgres
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - .env.prod
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - client_encoding=UTF8
      - -c
      - log_min_duration_statement=1000
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  pgbouncer:
    image: edoburu/pgbouncer:1.24.1-p1
    container_name: pmtl-pgbouncer
    restart: unless-stopped
    mem_limit: 128m
    env_file:
      - .env.prod
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: ${PGBOUNCER_POOL_MODE:-transaction}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-2000}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-50}
      RESERVE_POOL_SIZE: ${PGBOUNCER_RESERVE_POOL_SIZE:-10}
      SERVER_IDLE_TIMEOUT: ${PGBOUNCER_SERVER_IDLE_TIMEOUT:-30}
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: pmtl-meilisearch
    restart: unless-stopped
    mem_limit: 512m
    env_file:
      - .env.prod
    environment:
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_NO_ANALYTICS: "true"
      MEILI_SCHEDULE_SNAPSHOT: ${MEILI_SCHEDULE_SNAPSHOT:-86400}
      MEILI_SNAPSHOT_DIR: ${MEILI_SNAPSHOT_DIR:-/meili_data/snapshots}
    volumes:
      - meili-prod-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: pmtl-redis
    restart: unless-stopped
    mem_limit: 256m
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy volatile-lru
    volumes:
      - redis-prod-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  worker:
    image: ${CMS_IMAGE}
    container_name: pmtl-worker
    restart: unless-stopped
    mem_limit: 512m
    stop_grace_period: 40s
    env_file:
      - .env.prod
    environment:
      WORKER_HEARTBEAT_PATH: /var/run/pmtl/worker-heartbeat.json
      WORKER_HEARTBEAT_STALE_SECONDS: "120"
    command: ["pnpm", "--filter", "@pmtl/cms", "worker:start"]
    depends_on:
      cms:
        condition: service_healthy
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - worker-heartbeat:/var/run/pmtl
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const fs=require('fs');const p=process.env.WORKER_HEARTBEAT_PATH||'/tmp/pmtl-worker-heartbeat';const stale=Number(process.env.WORKER_HEARTBEAT_STALE_SECONDS||120)*1000;const stat=fs.statSync(p);if(Date.now()-stat.mtimeMs>stale) process.exit(1);"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  blackbox-exporter:
    profiles: ["monitoring"]
    image: ${MONITORING_BLACKBOX_IMAGE:-quay.io/prometheus/blackbox-exporter:v0.28.0}
    container_name: pmtl-blackbox
    restart: unless-stopped
    mem_limit: 64m
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ../monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

  postgres-exporter:
    profiles: ["monitoring"]
    image: ${MONITORING_POSTGRES_EXPORTER_IMAGE:-quay.io/prometheuscommunity/postgres-exporter:v0.18.1}
    container_name: pmtl-postgres-exporter
    restart: unless-stopped
    mem_limit: 96m
    env_file:
      - .env.prod
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

  redis-exporter:
    profiles: ["monitoring"]
    image: ${MONITORING_REDIS_EXPORTER_IMAGE:-oliver006/redis_exporter:v1.72.1}
    container_name: pmtl-redis-exporter
    restart: unless-stopped
    mem_limit: 64m
    env_file:
      - .env.prod
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

  alertmanager:
    profiles: ["monitoring"]
    image: ${MONITORING_ALERTMANAGER_IMAGE:-prom/alertmanager:v0.29.0}
    container_name: pmtl-alertmanager
    restart: unless-stopped
    mem_limit: 128m
    env_file:
      - .env.prod
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
    volumes:
      - ../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

  prometheus:
    profiles: ["monitoring"]
    image: ${MONITORING_PROMETHEUS_IMAGE:-prom/prometheus:v3.5.1}
    container_name: pmtl-prometheus
    restart: unless-stopped
    mem_limit: 384m
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-512MB}
      - --web.enable-lifecycle
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      alertmanager:
        condition: service_healthy
      blackbox-exporter:
        condition: service_started
      caddy:
        condition: service_started
      node-exporter:
        condition: service_started
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

  grafana:
    profiles: ["monitoring"]
    image: ${MONITORING_GRAFANA_IMAGE:-grafana/grafana:12.0.1}
    container_name: pmtl-grafana
    restart: unless-stopped
    mem_limit: 256m
    env_file:
      - .env.prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: ${PMTL_DOMAIN}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://127.0.0.1:${GRAFANA_PORT:-3300}}
    volumes:
      - ../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3300}:3000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

  node-exporter:
    profiles: ["monitoring"]
    image: ${MONITORING_NODE_EXPORTER_IMAGE:-quay.io/prometheus/node-exporter:v1.10.2}
    container_name: pmtl-node-exporter
    restart: unless-stopped
    mem_limit: 96m
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"

volumes:
  postgres-prod-data:
  meili-prod-data:
  redis-prod-data:
  caddy-data:
  caddy-config:
  worker-heartbeat:
  cms-media-prod:
  prometheus-data:
  grafana-data:

networks:
  frontend:
  backend:
