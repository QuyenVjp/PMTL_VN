global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    project: pmtl-vn

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ["http://web:3000/api/health"]
        labels:
          service: web
      - targets: ["http://cms:3001/api/health"]
        labels:
          service: cms
      - targets: ["http://cms:3001/api/worker/health"]
        labels:
          service: worker
      - targets: ["http://meilisearch:7700/health"]
        labels:
          service: meilisearch
      - targets: ["http://caddy:2019/config/"]
        labels:
          service: caddy
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [service]
        target_label: service
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: worker-metrics
    metrics_path: /api/metrics/worker
    static_configs:
      - targets: ["cms:3001"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
