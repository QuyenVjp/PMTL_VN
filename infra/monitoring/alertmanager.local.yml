global:
  resolve_timeout: 5m

route:
  receiver: local-webhook
  group_by: ["alertname", "service", "severity"]
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 15m

receivers:
  - name: local-webhook
    webhook_configs:
      - url: http://alert-sink:8080/alerts
        send_resolved: true
