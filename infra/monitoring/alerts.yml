groups:
  - name: pmtl-service-health
    rules:
      - alert: PMTLServiceDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} không phản hồi"
          description: "Blackbox probe thất bại với {{ $labels.service }} (đích: {{ $labels.instance }}) liên tục hơn 2 phút."

      - alert: PMTLWebHigh5xx
        expr: sum(rate(caddy_http_request_duration_seconds_count{host=~".+",code=~"5.."}[5m])) by (host) > 0.05
        for: 10m
        labels:
          severity: critical
          service: web
        annotations:
          summary: "Web đang trả về lỗi 5xx"
          description: "Host {{ $labels.host }} có tỷ lệ 5xx duy trì trên 0.05 request/giây trong 10 phút gần nhất."

      - alert: PMTLWorkerHeartbeatStale
        expr: pmtl_worker_healthy == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Heartbeat của worker đã lỗi thời"
          description: "Worker đang ở trạng thái không khỏe liên tục hơn 2 phút; giá trị heartbeat hiện tại là {{ $value }}."

      - alert: PMTLWorkerFailedJobs
        expr: pmtl_worker_queue_jobs{state="failed"} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Hàng đợi worker có job lỗi"
          description: "Queue {{ $labels.queue }} hiện có {{ $value }} job lỗi đang chờ kiểm tra."

  - name: pmtl-data-stores
    rules:
      - alert: PMTLRedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter đang không hoạt động"
          description: "Prometheus không scrape được redis-exporter liên tục hơn 2 phút."

      - alert: PMTLRedisMemoryHigh
        expr: redis_memory_max_bytes > 0 and (redis_memory_used_bytes / redis_memory_max_bytes) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Bộ nhớ Redis vượt 80%"
          description: "Redis đang dùng quá 80% ngưỡng maxmemory đã cấu hình."

      - alert: PMTLPostgresDown
        expr: postgres_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL đang không hoạt động"
          description: "postgres-exporter ghi nhận postgres_up=0 liên tục hơn 2 phút."

      - alert: PMTLPostgresConnectionsHigh
        expr: sum(postgres_stat_database_numbackends{datname!~"template0|template1"}) by (instance) / max(pg_settings_max_connections) by (instance) > 0.8
        for: 10m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Mức sử dụng kết nối PostgreSQL đang cao"
          description: "PostgreSQL trên {{ $labels.instance }} đang vượt 80% max_connections liên tục hơn 10 phút."

  - name: pmtl-host-resources
    rules:
      - alert: PMTLHostMemoryHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 10m
        labels:
          severity: critical
          service: host
        annotations:
          summary: "Bộ nhớ máy chủ vượt 90%"
          description: "Node exporter ghi nhận mức dùng RAM trên {{ $labels.instance }} vượt 90% liên tục hơn 10 phút."

      - alert: PMTLHostDiskLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})) > 0.9
        for: 15m
        labels:
          severity: critical
          service: host
        annotations:
          summary: "Phân vùng gốc của máy chủ đã dùng quá 90%"
          description: "Dung lượng đĩa ở filesystem gốc trên {{ $labels.instance }} vượt 90% liên tục hơn 15 phút."
