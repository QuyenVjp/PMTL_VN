groups:
  - name: pmtl-service-health
    rules:
      - alert: PMTLServiceDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} is unreachable"
          description: "Blackbox probe failed for {{ $labels.service }} (target: {{ $labels.instance }}) for more than 2 minutes."

      - alert: PMTLWebHigh5xx
        expr: sum(rate(caddy_http_request_duration_seconds_count{host=~".+",code=~"5.."}[5m])) by (host) > 0.05
        for: 10m
        labels:
          severity: critical
          service: web
        annotations:
          summary: "Web is serving 5xx responses"
          description: "Host {{ $labels.host }} has a sustained 5xx rate above 0.05 req/s over the last 10 minutes."

      - alert: PMTLWorkerHeartbeatStale
        expr: pmtl_worker_healthy == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Worker heartbeat is stale"
          description: "Worker heartbeat age is {{ $value }} state unhealthy for more than 2 minutes."

      - alert: PMTLWorkerFailedJobs
        expr: pmtl_worker_queue_jobs{state="failed"} > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Worker queue has failed jobs"
          description: "Queue {{ $labels.queue }} has {{ $value }} failed jobs pending review."

  - name: pmtl-data-stores
    rules:
      - alert: PMTLRedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter is down"
          description: "Prometheus cannot scrape redis-exporter for more than 2 minutes."

      - alert: PMTLRedisMemoryHigh
        expr: redis_memory_max_bytes > 0 and (redis_memory_used_bytes / redis_memory_max_bytes) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory above 80%"
          description: "Redis memory usage is above 80% of configured maxmemory."

      - alert: PMTLPostgresDown
        expr: postgres_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "postgres-exporter reports postgres_up=0 for more than 2 minutes."

      - alert: PMTLPostgresConnectionsHigh
        expr: sum(postgres_stat_database_numbackends{datname!~"template0|template1"}) by (instance) / max(pg_settings_max_connections) by (instance) > 0.8
        for: 10m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connection usage is high"
          description: "PostgreSQL is above 80% of max_connections on {{ $labels.instance }} for more than 10 minutes."

  - name: pmtl-host-resources
    rules:
      - alert: PMTLHostMemoryHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 10m
        labels:
          severity: critical
          service: host
        annotations:
          summary: "Host memory usage is above 90%"
          description: "Node exporter reports memory usage above 90% for more than 10 minutes on {{ $labels.instance }}."

      - alert: PMTLHostDiskLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{mountpoint="/",fstype!~"tmpfs|overlay"})) > 0.9
        for: 15m
        labels:
          severity: critical
          service: host
        annotations:
          summary: "Host root filesystem is above 90% used"
          description: "Disk usage on the root filesystem is above 90% for more than 15 minutes on {{ $labels.instance }}."
