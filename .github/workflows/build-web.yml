name: Build Web Image

on:
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/**
      - package.json
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/build-web.yml
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pmtl-vn-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

